<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gomini AI | Premium Business Assistant</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;900&display=swap');
        
        :root { 
            --bhagwa: #ff9933; 
            --bhagwa-dark: #e68a00;
            --bg-white: #ffffff;
            --text-dark: #1a1a1a;
            --border-color: #f0f0f0;
        }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(-45deg, #ffffff, #fff8f0, #fcfcfc, #fff1e6);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            color: var(--text-dark); 
            margin: 0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .premium-header { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color); 
            box-shadow: 0 4px 30px rgba(0,0,0,0.04);
            z-index: 50; 
        }

        .floating-logo {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
            100% { transform: translateY(0px); }
        }
        
        .chat-container { flex-grow: 1; overflow-y: auto; padding: 24px 20px; scroll-behavior: smooth; background: transparent; }
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: rgba(255,153,51,0.3); border-radius: 10px; }

        .msg-bubble { 
            max-width: 85%; padding: 16px 20px; border-radius: 24px; font-size: 14.5px; line-height: 1.6; font-weight: 500; 
            word-wrap: break-word; opacity: 0; 
            animation: popInBounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; 
        }
        
        @keyframes popInBounce { 
            0% { opacity: 0; transform: translateY(20px) scale(0.9); } 
            70% { transform: translateY(-3px) scale(1.02); }
            100% { opacity: 1; transform: translateY(0) scale(1); } 
        }
        
        .msg-user { 
            background: linear-gradient(135deg, var(--bhagwa), var(--bhagwa-dark)); 
            color: white; border-bottom-right-radius: 6px; margin-left: auto; 
            box-shadow: 0 8px 24px rgba(255, 153, 51, 0.25);
        }
        
        .msg-ai { 
            background: var(--bg-white); color: var(--text-dark); 
            border-bottom-left-radius: 6px; margin-right: auto; 
            border: 1px solid var(--border-color); 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }
        .msg-ai:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(0,0,0,0.08); }

        .input-area { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-color);
            padding: 16px 24px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.03);
        }
        .m-input { 
            background: #f9fafb; border: 1px solid #e5e7eb; 
            border-radius: 30px; padding: 15px 24px; width: 100%; color: var(--text-dark); 
            outline: none; transition: all 0.3s ease; font-size: 14.5px; font-weight: 500;
        }
        .m-input:focus { 
            border-color: var(--bhagwa); background: var(--bg-white); 
            box-shadow: 0 0 0 4px rgba(255, 153, 51, 0.15); 
            transform: scale(1.01);
        }

        .action-btn { 
            background: var(--bhagwa); color: white; border: none; border-radius: 50%; 
            width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); flex-shrink: 0; 
            box-shadow: 0 6px 20px rgba(255,153,51,0.3);
        }
        .action-btn:hover { 
            transform: translateY(-3px) rotate(10deg) scale(1.05); 
            background: var(--bhagwa-dark); 
            box-shadow: 0 10px 25px rgba(255,153,51,0.5); 
        }
        .action-btn:active { transform: scale(0.95); }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .loading-text { 
            color: var(--bhagwa); font-weight: 600; font-style: italic; letter-spacing: 0.5px; 
            animation: pulseText 1.5s infinite;
        }
        @keyframes pulseText { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .typing-dots { display: flex; gap: 4px; align-items: center; padding: 5px; }
        .dot { width: 6px; height: 6px; background: var(--bhagwa); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>

    <header class="premium-header w-full px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <div class="relative floating-logo">
                <img src="https://i.ibb.co/G4xsrr6j/qafx-Ln-R-md.png" class="w-12 h-12 rounded-xl border border-gray-100 shadow-sm object-contain bg-white p-1" crossorigin="anonymous" alt="Logo">
                <div class="absolute -bottom-1 -right-1 w-3.5 h-3.5 bg-emerald-500 border-2 border-white rounded-full animate-pulse"></div>
            </div>
            <div>
                <h1 class="text-xl font-black uppercase tracking-wide text-gray-900">Gomini <span class="text-[#ff9933]">AI</span></h1>
                <p class="text-[10px] text-[#ff9933] font-bold tracking-[2px] uppercase">Business Assistant</p>
            </div>
        </div>
        <button onclick="clearMemory()" class="text-[11px] font-bold uppercase text-gray-400 hover:text-[#ff9933] transition bg-white hover:bg-orange-50 px-4 py-2 rounded-full border border-gray-200 shadow-sm hover:shadow-md">Clear</button>
    </header>

    <main id="chatBox" class="chat-container flex flex-col gap-5 w-full max-w-4xl mx-auto">
        <div class="msg-bubble msg-ai flex flex-col gap-2">
            <div class="flex items-start gap-4">
                <div class="w-10 h-10 rounded-full bg-orange-50 flex items-center justify-center shrink-0 border border-orange-100 shadow-sm">
                    <img src="https://i.ibb.co/G4xsrr6j/qafx-Ln-R-md.png" class="w-6 h-6 object-contain" crossorigin="anonymous">
                </div>
                <div class="pt-2 text-gray-700">
                    नमस्ते! मैं Gomini हूँ, संजय पटेल जी की स्मार्ट बिज़नेस असिस्टेंट। आप सिंपल फर्नीचर, रसीद या कस्टमर वॉल्ट से जुड़ी जानकारी के लिए मुझसे पूछ सकते हैं।
                </div>
            </div>
        </div>
    </main>

    <footer class="input-area w-full">
        <div class="max-w-4xl mx-auto flex gap-3 items-center relative">
            <input type="text" id="userInput" placeholder="यहाँ मैसेज लिखें..." class="m-input" autocomplete="off" onkeypress="handleEnter(event)">
            
            <button id="sendBtn" onclick="sendMessage()" class="action-btn">
                <svg class="w-6 h-6 ml-1" fill="white" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
            </button>
        </div>
    </footer>

    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw4hWnhbCey4W0yq2IT5iB6ZJg5pn2RerkS4QEx24rwSLfr_OEGjX_1R_rGHK_tFHmt/exec";

        async function sendMessage() {
            const inputEl = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const text = inputEl.value.trim();
            
            if(!text) return;

            inputEl.value = "";
            inputEl.disabled = true;
            sendBtn.disabled = true;

            addMessageToUI(text, 'user', true);
            const typingObj = showTypingIndicator();

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ prompt: text })
                });
                
                const result = await response.json();
                
                // 🔴 यहाँ से सख्त एरर चेकिंग हटा दी गई है। जो असल रिस्पॉन्स आएगा, वही दिखेगा।
                let aiReply = result.reply || "No response received from server.";
                
                let formattedReply = aiReply.replace(/\*\*(.*?)\*\*/g, '<strong class="text-[#ff9933] font-bold">$1</strong>');
                formattedReply = formattedReply.replace(/\n/g, '<br>');

                clearInterval(typingObj.interval);
                document.getElementById(typingObj.id).remove();
                addMessageToUI(formattedReply, 'ai', true);

            } catch (error) {
                // 🔴 नेटवर्क या Fetch एरर का असली कारण दिखाने के लिए
                clearInterval(typingObj.interval);
                document.getElementById(typingObj.id).remove();
                addMessageToUI(`Connection Error: ${error.message}. Please check your internet or Apps Script deployment.`, 'ai', true);
            }

            inputEl.disabled = false;
            sendBtn.disabled = false;
            inputEl.focus();
        }

        function handleEnter(e) { if(e.key === 'Enter') sendMessage(); }

        function showTypingIndicator() {
            const chatBox = document.getElementById('chatBox');
            const id = 'typing-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = `msg-bubble msg-ai flex flex-col gap-2`;
            div.innerHTML = `
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-orange-50 flex items-center justify-center shrink-0 border border-orange-100">
                        <img src="https://i.ibb.co/G4xsrr6j/qafx-Ln-R-md.png" class="w-6 h-6 object-contain" crossorigin="anonymous">
                    </div>
                    <div class="pt-1 text-gray-700 flex items-center gap-2">
                        <span id="loading-text-${id}" class="loading-text">Thinking...</span>
                        <div class="typing-dots pt-1">
                            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                        </div>
                    </div>
                </div>
            `;
            chatBox.appendChild(div);
            scrollToBottom();

            const textElement = document.getElementById(`loading-text-${id}`);
            let step = 0;
            const interval = setInterval(() => {
                step++;
                if (step === 1) textElement.innerText = "Analysing the topic...";
                if (step === 2) textElement.innerText = "Answering the question...";
            }, 1500);

            return { id: id, interval: interval };
        }

        function addMessageToUI(text, sender, animate) {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            
            if(sender === 'user') {
                div.className = `msg-bubble msg-user ${animate?'':'animate-none'}`;
                div.innerHTML = text;
            } else {
                div.className = `msg-bubble msg-ai flex flex-col gap-2 ${animate?'':'animate-none'}`;
                div.innerHTML = `
                    <div class="flex items-start gap-4">
                        <div class="w-10 h-10 rounded-full bg-orange-50 flex items-center justify-center shrink-0 border border-orange-100 mt-1">
                            <img src="https://i.ibb.co/G4xsrr6j/qafx-Ln-R-md.png" class="w-6 h-6 object-contain" crossorigin="anonymous">
                        </div>
                        <div class="pt-2 text-gray-700">${text}</div>
                    </div>
                `;
            }
            chatBox.appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() {
            const chatBox = document.getElementById('chatBox');
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function clearMemory() {
            const chatBox = document.getElementById('chatBox');
            while(chatBox.children.length > 1) { chatBox.removeChild(chatBox.lastChild); }
        }
    </script>
</body>
</html>
