<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gomini AI | Premium Business Assistant</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;900&display=swap');
        
        :root { 
            --bhagwa: #ff9933; 
            --bhagwa-dark: #e68a00;
            --bg-white: #ffffff;
            --bg-light-gray: #fcfcfc;
            --text-dark: #1a1a1a;
            --border-color: #f0f0f0;
        }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-white); 
            color: var(--text-dark); 
            margin: 0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* 🪟 SUPER PREMIUM HEADER */
        .premium-header { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color); 
            box-shadow: 0 4px 30px rgba(0,0,0,0.03);
            z-index: 50; 
        }
        
        /* 💬 CHAT BUBBLES (CLEAN & WHITE) */
        .chat-container { flex-grow: 1; overflow-y: auto; padding: 24px 20px; scroll-behavior: smooth; background: var(--bg-light-gray); }
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: rgba(255,153,51,0.3); border-radius: 10px; }

        .msg-bubble { 
            max-width: 85%; padding: 16px 20px; border-radius: 24px; font-size: 14.5px; line-height: 1.6; font-weight: 500; 
            word-wrap: break-word; opacity: 0; animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }
        
        /* User Message */
        .msg-user { 
            background: linear-gradient(135deg, var(--bhagwa), var(--bhagwa-dark)); 
            color: white; border-bottom-right-radius: 6px; margin-left: auto; 
            box-shadow: 0 8px 24px rgba(255, 153, 51, 0.25);
        }
        
        /* AI Message (Pure White with subtle shadow) */
        .msg-ai { 
            background: var(--bg-white); color: var(--text-dark); 
            border-bottom-left-radius: 6px; margin-right: auto; 
            border: 1px solid var(--border-color); 
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }

        @keyframes popIn { 0% { opacity: 0; transform: translateY(15px) scale(0.95); } 100% { opacity: 1; transform: translateY(0) scale(1); } }

        /* ⌨️ INPUT AREA (MINIMALIST) */
        .input-area { 
            background: var(--bg-white); 
            border-top: 1px solid var(--border-color);
            padding: 16px 24px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.02);
        }
        .m-input { 
            background: var(--bg-light-gray); border: 1px solid #e5e7eb; 
            border-radius: 30px; padding: 15px 24px; width: 100%; color: var(--text-dark); 
            outline: none; transition: all 0.3s ease; font-size: 14.5px; font-weight: 500;
        }
        .m-input:focus { 
            border-color: var(--bhagwa); background: var(--bg-white); 
            box-shadow: 0 0 0 4px rgba(255, 153, 51, 0.1); 
        }

        /* 🔘 BUTTONS */
        .action-btn { 
            background: var(--bhagwa); color: white; border: none; border-radius: 50%; 
            width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: all 0.3s ease; flex-shrink: 0; 
            box-shadow: 0 6px 20px rgba(255,153,51,0.3);
        }
        .action-btn:hover { transform: translateY(-2px); background: var(--bhagwa-dark); box-shadow: 0 8px 25px rgba(255,153,51,0.4); }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .mic-btn.recording {
            animation: pulseRecord 1.5s infinite; background: #ef4444; 
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); color: white !important; border: none;
        }
        @keyframes pulseRecord { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }

        /* 🔊 SPEAKER BUTTON */
        .speak-btn {
            background: transparent; color: #9ca3af; border: none;
            border-radius: 50%; width: 34px; height: 34px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
            margin-top: 8px;
        }
        .speak-btn:hover { background: rgba(255,153,51,0.1); color: var(--bhagwa); }

        /* ⏳ LOADING TEXT ANIMATION */
        .loading-text { color: var(--bhagwa); font-weight: 600; font-style: italic; letter-spacing: 0.5px; }
        
        .typing-dots { display: flex; gap: 4px; align-items: center; padding: 5px; }
        .dot { width: 6px; height: 6px; background: var(--bhagwa); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>

    <header class="premium-header w-full px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <div class="relative">
                <img src="https://i.ibb.co/G4xsrr6j/qafx-Ln-R-md.png" class="w-12 h-12 rounded-xl border border-gray-100 shadow-sm object-contain bg-white p-1" crossorigin="anonymous" alt="Logo">
                <div class="absolute -bottom-1 -right-1 w-3.5 h-3.5 bg-emerald-500 border-2 border-white rounded-full animate-pulse"></div>
            </div>
            <div>
                <h1 class="text-xl font-black uppercase tracking-wide text-gray-900">Gomini <span class="text-[#ff9933]">AI</span></h1>
                <p class="text-[10px] text-gray-500 font-bold tracking-[2px] uppercase">Sanjay Patel's Assistant</p>
            </div>
        </div>
        <button onclick="clearMemory()" class="text-[11px] font-bold uppercase text-gray-400 hover:text-[#ff9933] transition bg-gray-50 hover:bg-orange-50 px-4 py-2 rounded-full border border-gray-100">Clear</button>
    </header>

    <main id="chatBox" class="chat-container flex flex-col gap-5 w-full max-w-4xl mx-auto">
        <div class="msg-bubble msg-ai flex flex-col gap-2">
            <div class="flex items-start gap-4">
                <div class="w-10 h-10 rounded-full bg-orange-50 flex items-center justify-center shrink-0 border border-orange-100 shadow-sm">
                    <img src="https://i.ibb.co/G4xsrr6j/qafx-Ln-R-md.png" class="w-6 h-6 object-contain" crossorigin="anonymous">
                </div>
                <div class="pt-2 text-gray-700 ai-text">
                    नमस्ते! मैं Gomini हूँ, संजय पटेल जी की स्मार्ट बिज़नेस असिस्टेंट। आप सिंपल फर्नीचर, रसीद या कस्टमर वॉल्ट से जुड़ी जानकारी के लिए मुझसे पूछ सकते हैं।
                </div>
            </div>
            <div class="flex justify-end border-t border-gray-50 pt-1 mt-2">
                <button onclick="speakAI(this)" class="speak-btn" title="बोलकर सुनें">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.983 3.983 0 00-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd"></path></svg>
                </button>
            </div>
        </div>
    </main>

    <footer class="input-area w-full">
        <div class="max-w-4xl mx-auto flex gap-3 items-center relative">
            <input type="text" id="userInput" placeholder="यहाँ मैसेज लिखें या बोलें..." class="m-input" autocomplete="off" onkeypress="handleEnter(event)">
            
            <button id="micBtn" onclick="toggleMic()" class="action-btn mic-btn bg-white !text-gray-500 border border-gray-200 shadow-sm hover:!text-[#ff9933] hover:border-[#ff9933]">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M7 4a3 3 0 016 0v4a3 3 0 11-6 0V4zm4 10.93A7.001 7.001 0 0017 8a1 1 0 10-2 0A5 5 0 015 8a1 1 0 00-2 0 7.001 7.001 0 006 6.93V17H6a1 1 0 100 2h8a1 1 0 100-2h-3v-2.07z" clip-rule="evenodd"></path></svg>
            </button>

            <button id="sendBtn" onclick="sendMessage()" class="action-btn">
                <svg class="w-5 h-5 ml-1" fill="white" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
            </button>
        </div>
    </footer>

    <script>
        // 🚀 आपका Deployment URL
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw4hWnhbCey4W0yq2IT5iB6ZJg5pn2RerkS4QEx24rwSLfr_OEGjX_1R_rGHK_tFHmt/exec";

        // --- 🕵️ SMART VOICE HUNTER (Premium Chrome Voice Logic) ---
        let bestHindiVoice = null;

        function loadBestVoice() {
            const voices = window.speechSynthesis.getVoices();
            if (voices.length === 0) return;

            // हिन्दी आवाज़ों को छांटें
            let hiVoices = voices.filter(v => v.lang.includes('hi') || v.lang.includes('IN'));
            
            // सबसे पहले 'Online', 'Network' या 'Google' वाली आवाज़ ढूंढें (ये असली इंसान जैसी होती हैं)
            bestHindiVoice = hiVoices.find(v => v.name.toLowerCase().includes('online') || v.name.toLowerCase().includes('network')) 
                           || hiVoices.find(v => v.name.toLowerCase().includes('google')) 
                           || hiVoices.find(v => v.name.toLowerCase().includes('natural')) 
                           || hiVoices[0]; // कुछ न मिले तो जो पहली मिले वही सेट करें
        }

        // ब्राउज़र जब आवाज़ें लोड करे, तब यह फंक्शन चलेगा
        window.speechSynthesis.onvoiceschanged = loadBestVoice;

        // --- SPEECH RECOGNITION (Mic to Text) ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let isRecording = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'hi-IN';
            recognition.continuous = false;
            
            recognition.onstart = function() {
                isRecording = true;
                document.getElementById('micBtn').classList.add('recording');
                document.getElementById('userInput').placeholder = "सुन रही हूँ... बोलिए";
            };
            
            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                document.getElementById('userInput').value = transcript;
                sendMessage(); 
            };
            
            recognition.onend = function() {
                isRecording = false;
                document.getElementById('micBtn').classList.remove('recording');
                document.getElementById('userInput').placeholder = "यहाँ मैसेज लिखें या बोलें...";
            };
        }

        function toggleMic() {
            if (!recognition) return alert("आपका ब्राउज़र माइक सपोर्ट नहीं करता। Chrome इस्तेमाल करें।");
            if (isRecording) { recognition.stop(); } 
            else { recognition.start(); }
        }

        // --- TEXT TO SPEECH (PLAY VOICE) ---
        function speakAI(btnElement) {
            if (!('speechSynthesis' in window)) {
                alert("आपका ब्राउज़र टेक्स्ट-टू-स्पीच सपोर्ट नहीं करता।");
                return;
            }
            const msgBox = btnElement.closest('.msg-ai').querySelector('.ai-text');
            const textToSpeak = msgBox.innerText || msgBox.textContent;

            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'hi-IN';
            
            // अगर पहले आवाज़ लोड नहीं हुई थी, तो अब फिर कोशिश करें
            if (!bestHindiVoice) loadBestVoice();
            
            if (bestHindiVoice) {
                utterance.voice = bestHindiVoice;
            }
            
            utterance.rate = 0.95; // बोलने की स्पीड थोड़ी नेचुरल की गई है

            const originalHTML = btnElement.innerHTML;
            btnElement.innerHTML = `<svg class="w-5 h-5 animate-pulse text-[#ff9933]" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>`;
            
            utterance.onend = function() { btnElement.innerHTML = originalHTML; };
            window.speechSynthesis.speak(utterance);
        }

        // --- MAIN CHAT LOGIC ---
        async function sendMessage() {
            const inputEl = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const text = inputEl.value.trim();
            
            if(!text) return;

            inputEl.value = "";
            inputEl.disabled = true;
            sendBtn.disabled = true;

            addMessageToUI(text, 'user', true);
            const typingObj = showTypingIndicator();

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ prompt: text })
                });
                
                const result = await response.json();
                let aiReply = result.reply || "";

                if (aiReply.toLowerCase().includes("error") || aiReply === "") {
                    aiReply = "query unsuccessful you are asking beyond our business";
                }
                
                let formattedReply = aiReply.replace(/\*\*(.*?)\*\*/g, '<strong class="text-[#ff9933] font-bold">$1</strong>');
                formattedReply = formattedReply.replace(/\n/g, '<br>');

                clearInterval(typingObj.interval);
                document.getElementById(typingObj.id).remove();
                addMessageToUI(formattedReply, 'ai', true);

            } catch (error) {
                clearInterval(typingObj.interval);
                document.getElementById(typingObj.id).remove();
                addMessageToUI("query unsuccessful you are asking beyond our business", 'ai', true);
            }

            inputEl.disabled = false;
            sendBtn.disabled = false;
            inputEl.focus();
        }

        function handleEnter(e) { if(e.key === 'Enter') sendMessage(); }

        function showTypingIndicator() {
            const chatBox = document.getElementById('chatBox');
            const id = 'typing-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = `msg-bubble msg-ai flex flex-col gap-2`;
            div.innerHTML = `
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-orange-50 flex items-center justify-center shrink-0 border border-orange-100">
                        <img src="https://i.ibb.co/G4xsrr6j/qafx-Ln-R-md.png" class="w-6 h-6 object-contain" crossorigin="anonymous">
                    </div>
                    <div class="pt-1 text-gray-700 flex items-center gap-2">
                        <span id="loading-text-${id}" class="loading-text">Thinking...</span>
                        <div class="typing-dots pt-1">
                            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                        </div>
                    </div>
                </div>
            `;
            chatBox.appendChild(div);
            scrollToBottom();

            const textElement = document.getElementById(`loading-text-${id}`);
            let step = 0;
            const interval = setInterval(() => {
                step++;
                if (step === 1) textElement.innerText = "Analysing the topic...";
                if (step === 2) textElement.innerText = "Answering the question...";
            }, 1500);

            return { id: id, interval: interval };
        }

        function addMessageToUI(text, sender, animate) {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            
            if(sender === 'user') {
                div.className = `msg-bubble msg-user ${animate?'':'animate-none'}`;
                div.innerHTML = text;
            } else {
                div.className = `msg-bubble msg-ai flex flex-col gap-2 ${animate?'':'animate-none'}`;
                div.innerHTML = `
                    <div class="flex items-start gap-4">
                        <div class="w-10 h-10 rounded-full bg-orange-50 flex items-center justify-center shrink-0 border border-orange-100 mt-1">
                            <img src="https://i.ibb.co/G4xsrr6j/qafx-Ln-R-md.png" class="w-6 h-6 object-contain" crossorigin="anonymous">
                        </div>
                        <div class="pt-2 text-gray-700 ai-text">${text}</div>
                    </div>
                    <div class="flex justify-end border-t border-gray-50 pt-1 mt-2">
                        <button onclick="speakAI(this)" class="speak-btn" title="बोलकर सुनें">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.983 3.983 0 00-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd"></path></svg>
                        </button>
                    </div>
                `;
            }
            chatBox.appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() {
            const chatBox = document.getElementById('chatBox');
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function clearMemory() {
            const chatBox = document.getElementById('chatBox');
            while(chatBox.children.length > 1) { chatBox.removeChild(chatBox.lastChild); }
        }
    </script>
</body>
</html>
